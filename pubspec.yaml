name: serenity_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  uuid: ^4.0.0
  cupertino_icons: ^1.0.8
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5
  http: ^1.2.0
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  google_sign_in: ^6.2.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  url_launcher: ^6.2.5
  google_fonts: ^6.2.1
  firebase_messaging: ^15.1.3
  shared_preferences: ^2.3.2
  flutter_local_notifications: ^17.2.4
  cloud_firestore: ^5.6.12
  crypto: ^3.0.3
  youtube_player_flutter: ^9.0.2
  youtube_explode_dart: ^2.3.6
  local_auth: ^2.3.0
  provider: ^6.1.2                  # ← AGREGADO
  flutter_overlay_window: ^0.5.0   # Overlay sobre otras apps (SYSTEM_ALERT_WINDOW)
  flutter_foreground_task: 8.17.0  # Foreground Service persistente

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
